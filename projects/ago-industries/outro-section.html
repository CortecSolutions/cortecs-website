<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGO Industries - Outro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff6b00 0%, #ff8c00 100%);
      color: white;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    h1 {
      font-size: 72px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }
    .tagline {
      font-size: 32px;
      opacity: 0.95;
    }
    .contact {
      display: flex;
      align-items: center;
      gap: 40px;
      margin-top: 30px;
      font-size: 36px;
      font-weight: bold;
    }
    .divider {
      width: 2px;
      height: 50px;
      background: rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>
  <h1>AGO Industries</h1>
  <p class="tagline">Manufacturers of Industrial Safety Products</p>
  <div class="contact">
    <span>www.ago1.com</span>
    <div class="divider"></div>
    <span>519-452-3780</span>
  </div>
</body>
</html>
