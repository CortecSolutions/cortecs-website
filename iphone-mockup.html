<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cortec iPhone Mockup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    }

    .iphone-frame {
      width: 380px;
      height: 780px;
      background: #1a1a1a;
      border-radius: 55px;
      padding: 12px;
      box-shadow:
        0 0 0 3px #2a2a2a,
        0 50px 100px rgba(0,0,0,0.5),
        inset 0 0 20px rgba(255,255,255,0.05);
      position: relative;
    }

    .iphone-screen {
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #0f172a 0%, #0c1222 100%);
      border-radius: 45px;
      overflow: hidden;
      position: relative;
    }

    /* Dynamic Island */
    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 35px;
      background: #000;
      border-radius: 20px;
      z-index: 10;
    }

    /* Status Bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 28px 8px;
      color: white;
      font-size: 14px;
      font-weight: 600;
    }

    .status-bar-right {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    /* App Content */
    .app-content {
      padding: 60px 24px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: calc(100% - 50px);
    }

    .logo-container {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, rgba(14, 165, 233, 0.15), rgba(6, 182, 212, 0.1));
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      border: 1px solid rgba(14, 165, 233, 0.3);
    }

    .logo-container svg {
      width: 70px;
      height: 70px;
    }

    .app-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #0ea5e9, #06b6d4, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .app-subtitle {
      color: #64748b;
      font-size: 15px;
      margin-bottom: 40px;
    }

    /* Dashboard Cards */
    .dashboard {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(51, 65, 85, 0.5);
      border-radius: 16px;
      padding: 18px;
      backdrop-filter: blur(10px);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .card-title {
      color: #94a3b8;
      font-size: 13px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .card-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #0ea5e9, #06b6d4);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-icon svg {
      width: 18px;
      height: 18px;
      stroke: white;
      fill: none;
    }

    .card-value {
      color: white;
      font-size: 28px;
      font-weight: 700;
    }

    .card-change {
      color: #22c55e;
      font-size: 13px;
      margin-top: 4px;
    }

    .card-row {
      display: flex;
      gap: 14px;
    }

    .card-row .card {
      flex: 1;
    }

    .card-row .card-value {
      font-size: 22px;
    }

    /* Bottom Nav */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 85px;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(51, 65, 85, 0.5);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: 20px;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .nav-item svg {
      width: 24px;
      height: 24px;
      stroke: #64748b;
      fill: none;
    }

    .nav-item.active svg {
      stroke: #0ea5e9;
    }

    .nav-item span {
      font-size: 10px;
      color: #64748b;
    }

    .nav-item.active span {
      color: #0ea5e9;
    }

    /* Home indicator */
    .home-indicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 134px;
      height: 5px;
      background: rgba(255,255,255,0.3);
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="iphone-frame">
    <div class="iphone-screen">
      <div class="dynamic-island"></div>

      <div class="status-bar">
        <span>9:41</span>
        <div class="status-bar-right">

            <path d="M6 3C6 2.17 6.67 1.5 7.5 1.5H8.5C9.33 1.5 10 2.17 10 3V10.5C10 11.33 9.33 12 8.5 12H7.5C6.67 12 6 11.33 6 10.5V3Z"/>
            <path d="M11 1C11 0.45 11.45 0 12 0H13C13.55 0 14 0.45 14 1V10.5C14 11.33 13.33 12 12.5 12C11.67 12 11 11.33 11 10.5V1Z"/>
            <rect x="15" y="3" width="3" height="9" rx="1" fill="white" opacity="0.3"/>
          </svg>
          <svg width="16" height="12" viewBox="0 0 16 12" fill="white">
            <path d="M8 2.4C10.9 2.4 13.5 3.5 15.3 5.3C15.7 5.7 15.7 6.3 15.3 6.7C15 7 14.5 7.1 14.1 6.8C12.6 5.3 10.4 4.4 8 4.4C5.6 4.4 3.4 5.3 1.9 6.8C1.5 7.1 1 7 0.7 6.7C0.3 6.3 0.3 5.7 0.7 5.3C2.5 3.5 5.1 2.4 8 2.4Z"/>
            <path d="M8 6C9.8 6 11.4 6.7 12.6 7.8C13 8.2 13 8.8 12.6 9.2C12.3 9.5 11.8 9.5 11.4 9.2C10.5 8.4 9.3 7.9 8 7.9C6.7 7.9 5.5 8.4 4.6 9.2C4.2 9.5 3.7 9.5 3.4 9.2C3 8.8 3 8.2 3.4 7.8C4.6 6.7 6.2 6 8 6Z"/>
            <circle cx="8" cy="11" r="1.5" fill="white"/>
          </svg>
          <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
            <rect x="0.5" y="0.5" width="21" height="11" rx="2.5" stroke="white"/>
            <rect x="22" y="3.5" width="2" height="5" rx="1" fill="white"/>
            <rect x="2" y="2" width="17" height="8" rx="1.5" fill="#22c55e"/>
          </svg>
        </div>
      </div>

      <div class="app-content">
        <div class="logo-container">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
            <defs>
              <linearGradient id="cortecGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#0ea5e9"/>
                <stop offset="50%" stop-color="#06b6d4"/>

            </defs>
            <g transform="translate(50, 50)">
              <path d="M-2 -42 C-12 -42, -28 -32, -28 0 C-28 32, -12 42, -2 42" stroke="url(#cortecGradient)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
              <path d="M2 -42 C12 -42, 28 -32, 28 0 C28 32, 12 42, 2 42" stroke="url(#cortecGradient)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
              <line x1="0" y1="-36" x2="0" y2="-22" stroke="url(#cortecGradient)" stroke-width="2" stroke-linecap="round"/>
              <line x1="0" y1="22" x2="0" y2="36" stroke="url(#cortecGradient)" stroke-width="2" stroke-linecap="round"/>

              <circle cx="-5" cy="-8" r="2.5" fill="url(#cortecGradient)"/>
              <circle cx="-20" cy="0" r="2.5" fill="url(#cortecGradient)"/>
              <path d="M-5 8 L-12 8 L-12 18 L-16 18" stroke="url(#cortecGradient)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="-5" cy="8" r="2.5" fill="url(#cortecGradient)"/>
              <circle cx="-16" cy="18" r="2.5" fill="url(#cortecGradient)"/>
              <path d="M-5 28 L-5 22 L-10 22" stroke="url(#cortecGradient)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="-5" cy="28" r="2.5" fill="url(#cortecGradient)"/>
              <circle cx="-10" cy="22" r="2" fill="url(#cortecGradient)"/>
              <path d="M5 -28 L5 -22 L14 -22" stroke="url(#cortecGradient)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="5" cy="-28" r="2.5" fill="url(#cortecGradient)"/>
              <circle cx="14" cy="-22" r="2.5" fill="url(#cortecGradient)"/>
              <path d="M5 -8 L12 -8 L12 0 L20 0" stroke="url(#cortecGradient)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="5" cy="-8" r="2.5" fill="url(#cortecGradient)"/>
              <circle cx="20" cy="0" r="2.5" fill="url(#cortecGradient)"/>
              <path d="M5 8 L12 8 L12 18 L16 18" stroke="url(#cortecGradient)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="5" cy="8" r="2.5" fill="url(#cortecGradient)"/>
              <circle cx="16" cy="18" r="2.5" fill="url(#cortecGradient)"/>
              <path d="M5 28 L5 22 L10 22" stroke="url(#cortecGradient)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="5" cy="28" r="2.5" fill="url(#cortecGradient)"/>
              <circle cx="10" cy="22" r="2" fill="url(#cortecGradient)"/>
              <circle cx="0" cy="-22" r="2.5" fill="url(#cortecGradient)"/>
              <circle cx="0" cy="22" r="2.5" fill="url(#cortecGradient)"/>
            </g>
          </svg>
        </div>

        <h1 class="app-title">Cortec.</h1>
        <p class="app-subtitle">Intelligent Solutions</p>

        <div class="dashboard">
          <div class="card">
            <div class="card-header">
              <span class="card-title">Active Projects</span>
              <div class="card-icon">
                <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                  <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
              </div>
            </div>
            <div class="card-value">12</div>
            <div class="card-change">+3 this month</div>
          </div>

          <div class="card-row">
            <div class="card">
              <span class="card-title">Automations</span>
              <div class="card-value">847</div>
              <div class="card-change">Running</div>
            </div>
            <div class="card">
              <span class="card-title">Time Saved</span>
              <div class="card-value">126h</div>
              <div class="card-change">This week</div>
            </div>
          </div>
        </div>
      </div>

      <div class="bottom-nav">
        <div class="nav-item active">
          <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <span>Home</span>
        </div>
        <div class="nav-item">
          <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
          <span>Projects</span>
        </div>
        <div class="nav-item">
          <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 20V10"/>
            <path d="M12 20V4"/>
            <path d="M6 20v-6"/>

          <span>Analytics</span>
        </div>
        <div class="nav-item">
          <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>

      <div class="home-indicator"></div>
    </div>
  </div>
</body>
</html>
