<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Healthcare App Mockup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      font-family: 'Space Grotesk', -apple-system, sans-serif;
    }
    .iphone-frame {
      width: 380px;
      height: 780px;
      background: #1a1a1a;
      border-radius: 55px;
      padding: 12px;
      box-shadow: 0 0 0 3px #2a2a2a, 0 50px 100px rgba(0,0,0,0.5);
    }
    .iphone-screen {
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #f0f9ff 0%, #e0f2fe 100%);
      border-radius: 45px;
      overflow: hidden;
      position: relative;
    }
    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 35px;
      background: #000;
      border-radius: 20px;
      z-index: 10;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 16px 28px 8px;
      color: #0f172a;
      font-size: 14px;
      font-weight: 600;
    }
    .app-content {
      padding: 50px 20px 20px;
    }
    .header {
      margin-bottom: 24px;
    }
    .greeting {
      color: #64748b;
      font-size: 14px;
    }
    .title {
      color: #0f172a;
      font-size: 28px;
      font-weight: 700;
    }
    .next-appointment {
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      border-radius: 20px;
      padding: 20px;
      color: white;
      margin-bottom: 20px;
    }
    .appt-label {
      font-size: 12px;
      opacity: 0.8;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .appt-title {
      font-size: 20px;
      font-weight: 600;
      margin: 8px 0;
    }
    .appt-details {
      display: flex;
      gap: 16px;
      font-size: 14px;
      opacity: 0.9;
    }
    .quick-actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .action-btn {
      background: white;
      border-radius: 16px;
      padding: 16px 8px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .action-icon {
      width: 40px;
      height: 40px;
      background: #e0f2fe;
      border-radius: 12px;
      margin: 0 auto 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .action-icon svg {
      width: 20px;
      height: 20px;
      stroke: #0ea5e9;
    }
    .action-label {
      font-size: 11px;
      color: #64748b;
    }
    .section-title {
      font-size: 18px;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 12px;
    }
    .med-list {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .med-item {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid #f1f5f9;
    }
    .med-item:last-child { border: none; }
    .med-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 12px;
      margin-right: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .med-icon svg {
      width: 22px;
      height: 22px;
      stroke: white;
    }
    .med-info { flex: 1; }
    .med-name {
      font-weight: 600;
      color: #0f172a;
      font-size: 15px;
    }
    .med-dose {
      color: #64748b;
      font-size: 13px;
    }
    .med-time {
      color: #0ea5e9;
      font-weight: 600;
      font-size: 14px;
    }
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: white;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: 16px;
      border-top: 1px solid #e2e8f0;
    }
    .nav-item {
      text-align: center;
    }
    .nav-item svg {
      width: 24px;
      height: 24px;
      stroke: #94a3b8;
    }
    .nav-item.active svg {
      stroke: #0ea5e9;
    }
    .nav-item span {
      display: block;
      font-size: 10px;
      color: #94a3b8;
      margin-top: 4px;
    }
    .nav-item.active span {
      color: #0ea5e9;
    }
  </style>
</head>
<body>
  <div class="iphone-frame">
    <div class="iphone-screen">
      <div class="dynamic-island"></div>
      <div class="status-bar">
        <span>9:41</span>
        <span>100%</span>
      </div>

      <div class="app-content">
        <div class="header">
          <div class="greeting">Good morning,</div>
          <div class="title">Sarah Mitchell</div>
        </div>

        <div class="next-appointment">
          <div class="appt-label">Next Appointment</div>
          <div class="appt-title">Dr. Rebecca Chen</div>
          <div class="appt-details">
            <span>Jan 15, 2:30 PM</span>
            <span>General Checkup</span>
          </div>
        </div>

        <div class="quick-actions">
          <div class="action-btn">
            <div class="action-icon">
              <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" /></svg>
            </div>
            <div class="action-label">Book</div>
          </div>
          <div class="action-btn">
            <div class="action-icon">
              <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" /></svg>
            </div>
            <div class="action-label">Records</div>
          </div>
          <div class="action-btn">
            <div class="action-icon">
              <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z" /></svg>
            </div>
            <div class="action-label">Chat</div>
          </div>
          <div class="action-btn">
            <div class="action-icon">
              <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 014.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15.3M14.25 3.104c.251.023.501.05.75.082M19.8 15.3l-1.57.393A9.065 9.065 0 0112 15a9.065 9.065 0 00-6.23.693L5 14.5m14.8.8l1.402 1.402c1.232 1.232.65 3.318-1.067 3.611A48.309 48.309 0 0112 21c-2.773 0-5.491-.235-8.135-.687-1.718-.293-2.3-2.379-1.067-3.61L5 14.5" /></svg>
            </div>
            <div class="action-label">Rx</div>
          </div>
        </div>

        <div class="section-title">Today's Medications</div>
        <div class="med-list">
          <div class="med-item">
            <div class="med-icon">
              <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>
            </div>
            <div class="med-info">
              <div class="med-name">Metformin</div>
              <div class="med-dose">500mg - 1 tablet</div>
            </div>
            <div class="med-time">8:00 AM</div>
          </div>
          <div class="med-item">
            <div class="med-icon" style="background: linear-gradient(135deg, #f59e0b, #d97706);">
              <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            </div>
            <div class="med-info">
              <div class="med-name">Lisinopril</div>
              <div class="med-dose">10mg - 1 tablet</div>
            </div>
            <div class="med-time">2:00 PM</div>
          </div>
        </div>
      </div>

      <div class="bottom-nav">
        <div class="nav-item active">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" /></svg>
          <span>Home</span>
        </div>
        <div class="nav-item">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" /></svg>
          <span>Schedule</span>
        </div>
        <div class="nav-item">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" /></svg>
          <span>Health</span>
        </div>
        <div class="nav-item">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" /></svg>
          <span>Profile</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
