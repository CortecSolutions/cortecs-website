<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Media Manager Mockup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      font-family: 'Space Grotesk', -apple-system, sans-serif;
    }
    .iphone-frame {
      width: 380px;
      height: 780px;
      background: #1a1a1a;
      border-radius: 55px;
      padding: 12px;
      box-shadow: 0 0 0 3px #2a2a2a, 0 50px 100px rgba(0,0,0,0.5);
    }
    .iphone-screen {
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #1e1b4b 0%, #312e81 100%);
      border-radius: 45px;
      overflow: hidden;
      position: relative;
    }
    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 35px;
      background: #000;
      border-radius: 20px;
      z-index: 10;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 16px 28px 8px;
      color: white;
      font-size: 14px;
      font-weight: 600;
    }
    .app-content {
      padding: 50px 20px 20px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .title {
      color: white;
      font-size: 26px;
      font-weight: 700;
    }
    .add-btn {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .add-btn svg {
      width: 24px;
      height: 24px;
      stroke: white;
    }
    .platforms {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .platform {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 70px;
    }
    .platform-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .platform-icon.instagram { background: linear-gradient(135deg, #f59e0b, #ec4899, #8b5cf6); }
    .platform-icon.twitter { background: #1d9bf0; }
    .platform-icon.linkedin { background: #0a66c2; }
    .platform-icon.tiktok { background: linear-gradient(135deg, #00f2ea, #ff0050); }
    .platform-icon svg {
      width: 28px;
      height: 28px;
      fill: white;
    }
    .platform-name {
      font-size: 11px;
      color: #a5b4fc;
    }
    .section-title {
      color: white;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .scheduled-posts {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }
    .post-card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      padding: 16px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .post-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .post-platform {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .post-platform-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .post-platform-icon svg {
      width: 16px;
      height: 16px;
      fill: white;
    }
    .post-platform-name {
      color: white;
      font-weight: 600;
      font-size: 14px;
    }
    .post-time {
      color: #a5b4fc;
      font-size: 12px;
    }
    .post-content {
      color: #e0e7ff;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .post-preview {
      height: 80px;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.3), rgba(236, 72, 153, 0.3));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .post-preview svg {
      width: 32px;
      height: 32px;
      stroke: rgba(255,255,255,0.5);
    }
    .analytics-card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .analytics-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .analytics-title {
      color: white;
      font-weight: 600;
      font-size: 16px;
    }
    .analytics-period {
      color: #a5b4fc;
      font-size: 12px;
      background: rgba(255,255,255,0.1);
      padding: 6px 12px;
      border-radius: 8px;
    }
    .analytics-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .stat {
      text-align: center;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: white;
    }
    .stat-label {
      font-size: 11px;
      color: #a5b4fc;
      margin-top: 4px;
    }
    .stat-change {
      font-size: 11px;
      color: #4ade80;
      margin-top: 2px;
    }
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: rgba(30, 27, 75, 0.95);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: 16px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .nav-item {
      text-align: center;
    }
    .nav-item svg {
      width: 24px;
      height: 24px;
      stroke: #6366f1;
      fill: none;
    }
    .nav-item.active svg {
      stroke: #a5b4fc;
    }
    .nav-item span {
      display: block;
      font-size: 10px;
      color: #6366f1;
      margin-top: 4px;
    }
    .nav-item.active span {
      color: #a5b4fc;
    }
  </style>
</head>
