<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real Estate App Mockup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      font-family: 'Space Grotesk', -apple-system, sans-serif;
    }
    .iphone-frame {
      width: 380px;
      height: 780px;
      background: #1a1a1a;
      border-radius: 55px;
      padding: 12px;
      box-shadow: 0 0 0 3px #2a2a2a, 0 50px 100px rgba(0,0,0,0.5);
    }
    .iphone-screen {
      width: 100%;
      height: 100%;
      background: #fafaf9;
      border-radius: 45px;
      overflow: hidden;
      position: relative;
    }
    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 35px;
      background: #000;
      border-radius: 20px;
      z-index: 10;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 16px 28px 8px;
      color: #0f172a;
      font-size: 14px;
      font-weight: 600;
    }
    .app-content {
      padding: 50px 20px 20px;
    }
    .header {
      margin-bottom: 20px;
    }
    .location {
      color: #78716c;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .location svg {
      width: 14px;
      height: 14px;
      stroke: #78716c;
    }
    .title {
      color: #1c1917;
      font-size: 26px;
      font-weight: 700;
      margin-top: 4px;
    }
    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .search-input {
      flex: 1;
      background: white;
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .search-input svg {
      width: 18px;
      height: 18px;
      stroke: #a8a29e;
    }
    .search-input span {
      color: #a8a29e;
      font-size: 14px;
    }
    .filter-btn {
      width: 50px;
      background: linear-gradient(135deg, #ea580c, #c2410c);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .filter-btn svg {
      width: 20px;
      height: 20px;
      stroke: white;
    }
    .featured {
      margin-bottom: 20px;
    }
    .property-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    .property-image {
      height: 160px;
      background: linear-gradient(135deg, #fed7aa 0%, #fdba74 100%);
      position: relative;
    }
    .property-image::after {
      content: '';
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      height: 60px;
      background: linear-gradient(135deg, #78716c 0%, #57534e 100%);
      border-radius: 8px;
      opacity: 0.3;
    }
    .property-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: #ea580c;
      color: white;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
    }
    .property-favorite {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 36px;
      height: 36px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .property-favorite svg {
      width: 18px;
      height: 18px;
      stroke: #ea580c;
      fill: #ea580c;
    }
    .property-details {
      padding: 16px;
    }
    .property-price {
      font-size: 24px;
      font-weight: 700;
      color: #1c1917;
    }
    .property-price span {
      font-size: 14px;
      color: #78716c;
      font-weight: 400;
    }
    .property-address {
      color: #57534e;
      font-size: 14px;
      margin: 6px 0 12px;
    }
    .property-features {
      display: flex;
      gap: 16px;
    }
    .feature {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #78716c;
      font-size: 13px;
    }
    .feature svg {
      width: 16px;
      height: 16px;
      stroke: #78716c;
    }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: 18px;
      font-weight: 600;
      color: #1c1917;
    }
    .see-all {
      color: #ea580c;
      font-size: 13px;
      font-weight: 500;
    }
    .nearby-list {
      display: flex;
      gap: 12px;
    }
    .nearby-card {
      flex: 1;
      background: white;
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .nearby-image {
      height: 80px;
      background: linear-gradient(135deg, #e7e5e4 0%, #d6d3d1 100%);
      border-radius: 10px;
      margin-bottom: 10px;
    }
    .nearby-price {
      font-weight: 700;
      color: #1c1917;
      font-size: 15px;
    }
    .nearby-address {
      color: #78716c;
      font-size: 11px;
      margin-top: 2px;
    }
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: white;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: 16px;
      border-top: 1px solid #e7e5e4;
    }
    .nav-item {
      text-align: center;
    }
    .nav-item svg {
      width: 24px;
      height: 24px;
      stroke: #a8a29e;
      fill: none;
    }
    .nav-item.active svg {
      stroke: #ea580c;
    }
    .nav-item span {
      display: block;
      font-size: 10px;
      color: #a8a29e;
      margin-top: 4px;
    }
    .nav-item.active span {
      color: #ea580c;
    }
  </style>
</head>
<body>
  <div class="iphone-frame">
    <div class="iphone-screen">
      <div class="dynamic-island"></div>
      <div class="status-bar">
        <span>9:41</span>
        <span>100%</span>
      </div>

      <div class="app-content">
        <div class="header">
          <div class="location">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" /></svg>
            Toronto, ON
          </div>
          <div class="title">Find Your Home</div>
        </div>

        <div class="search-bar">
          <div class="search-input">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" /></svg>
            <span>Search address, city...</span>
          </div>
          <div class="filter-btn">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 11-3 0m3 0a1.5 1.5 0 10-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-9.75 0h9.75" /></svg>
          </div>
        </div>

        <div class="featured">
          <div class="property-card">
            <div class="property-image">
              <div class="property-badge">Featured</div>
              <div class="property-favorite">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" /></svg>
              </div>
            </div>
            <div class="property-details">
              <div class="property-price">$1,250,000 <span>/sale</span></div>
              <div class="property-address">142 Queen Street West, Toronto</div>
              <div class="property-features">
                <div class="feature">
                  <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" /></svg>
                  4 Beds
                </div>
                <div class="feature">
                  <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                  3 Baths
                </div>
                <div class="feature">
                  <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15" /></svg>
                  2,400 sqft
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="section-header">
          <div class="section-title">Nearby</div>
          <div class="see-all">See all</div>
        </div>
        <div class="nearby-list">
          <div class="nearby-card">
            <div class="nearby-image"></div>
            <div class="nearby-price">$890,000</div>
            <div class="nearby-address">88 Bloor St W</div>
          </div>
          <div class="nearby-card">
            <div class="nearby-image"></div>
            <div class="nearby-price">$725,000</div>
            <div class="nearby-address">201 Dundas St</div>
          </div>
        </div>
      </div>

      <div class="bottom-nav">
        <div class="nav-item active">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" /></svg>
          <span>Home</span>
        </div>
        <div class="nav-item">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" /></svg>
          <span>Search</span>
        </div>
        <div class="nav-item">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" /></svg>
          <span>Saved</span>
        </div>
        <div class="nav-item">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" /></svg>
          <span>Profile</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
